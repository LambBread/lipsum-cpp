name: Build and package

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.2.6'

      - name: Setup Doxygen
        uses: ssciwr/doxygen-install@v2

      - name: Build static library
        run: >
          cmake -S . -B build -DLPSM_BUILD_STATIC=ON -DLPSM_BUILD_CWRAPPER=ON 
          -DLPSM_BUILD_EXAMPLES=ON -DLPSM_FORMAT=OFF -DLPSM_BUILD_SAMPLE=OFF 
          -DLPSM_BUILD_VERSION=OFF -DCMAKE_BUILD_TYPE=Release -DLPSM_BUILD_CLI=ON 
          -DLPSM_BUILD_DOCS=ON &&
          cmake --build build

      - name: Run tests
        if: runner.os != 'Windows' 
        run: >
          ctest --test-dir build

      - name: Package with CPack
        run: |
          cd build && cpack

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lipsum-cpp-packages-${{ matrix.os }}
          path: |
            build/*.zip
            build/*.tar.gz
            build/*.deb
            build/*.dmg
            build/*.rpm
            build/*.msi
          if-no-files-found: ignore

  archlinux:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Arch Linux dependencies
        run: |
          pacman -Syu --noconfirm base-devel cmake doxygen git
          useradd -m builduser
          chown -R builduser:builduser "$GITHUB_WORKSPACE"
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build Arch Linux Package
        run: |
          su - builduser -c "cd \"$GITHUB_WORKSPACE\" && makepkg -s --noconfirm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lipsum-cpp-packages-archlinux
          path: |
            ./*.pkg.tar.zst
          if-no-files-found: ignore
